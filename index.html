<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="css/style.css" />
    <title>Glass Effects (iPhone-style)</title>
  </head>
  <body>
    <div class="app-bg">
      <div class="container py-4 py-md-5">
        <header class="mb-4">
          <div
            class="d-flex flex-wrap align-items-end justify-content-between gap-2">
            <div>
              <h1 class="h3 app-title mb-1">Glass Effects (iPhone-style)</h1>
              <p class="app-subtitle mb-0">
                Famous glass styles + live customization + one-click code copy.
              </p>
            </div>
            <div class="d-flex flex-wrap align-items-center gap-2">
              <div
                class="theme-toggle"
                aria-label="Theme">
                <div class="form-check form-switch m-0">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    role="switch"
                    id="themeToggle"
                    checked />
                  <label
                    class="form-check-label"
                    for="themeToggle">
                    Dark mode
                  </label>
                </div>
              </div>
              <div
                class="support-pill"
                id="supportPill"
                aria-live="polite"></div>
            </div>
          </div>
        </header>

        <div class="row g-3 g-lg-4 align-items-start">
          <div class="col-12 col-lg-7">
            <div class="preview-stage">
              <div
                class="glass-card"
                id="previewCard"
                role="region"
                aria-label="Glass preview">
                <div
                  class="glass-center"
                  aria-label="Glass Effect">
                  <div class="glass-center__text">Glass Effect</div>
                </div>
              </div>
            </div>

            <div class="mt-3">
              <div
                class="d-flex flex-wrap gap-2"
                id="styleChips"
                aria-label="Style presets"></div>
            </div>

            <div
              class="row g-3 mt-1"
              id="miniGallery"
              aria-label="Mini preview gallery"></div>
          </div>

          <div class="col-12 col-lg-5">
            <div class="panel">
              <div class="panel__title">Customize</div>
              <div class="row g-3">
                <div class="col-6">
                  <label class="form-label">Blur (px)</label>
                  <input
                    class="form-range"
                    type="range"
                    id="blur"
                    min="0"
                    max="40"
                    step="1" />
                </div>
                <div class="col-6">
                  <label class="form-label">Opacity</label>
                  <input
                    class="form-range"
                    type="range"
                    id="opacity"
                    min="0.05"
                    max="0.45"
                    step="0.01" />
                </div>
                <div class="col-6">
                  <label class="form-label">Saturation (%)</label>
                  <input
                    class="form-range"
                    type="range"
                    id="sat"
                    min="80"
                    max="220"
                    step="1" />
                </div>
                <div class="col-6">
                  <label class="form-label">Brightness (%)</label>
                  <input
                    class="form-range"
                    type="range"
                    id="bright"
                    min="90"
                    max="140"
                    step="1" />
                </div>
                <div class="col-6">
                  <label class="form-label">Border alpha</label>
                  <input
                    class="form-range"
                    type="range"
                    id="border"
                    min="0.0"
                    max="0.65"
                    step="0.01" />
                </div>
                <div class="col-6">
                  <label class="form-label">Radius (px)</label>
                  <input
                    class="form-range"
                    type="range"
                    id="radius"
                    min="8"
                    max="40"
                    step="1" />
                </div>
                <div class="col-6">
                  <label class="form-label">Tint hue</label>
                  <input
                    class="form-range"
                    type="range"
                    id="tintHue"
                    min="0"
                    max="360"
                    step="1" />
                </div>
                <div class="col-6">
                  <label class="form-label">Tint alpha</label>
                  <input
                    class="form-range"
                    type="range"
                    id="tintAlpha"
                    min="0"
                    max="0.25"
                    step="0.01" />
                </div>
                <div class="col-6">
                  <label class="form-label">Noise</label>
                  <input
                    class="form-range"
                    type="range"
                    id="noise"
                    min="0"
                    max="0.14"
                    step="0.01" />
                </div>
                <div class="col-6">
                  <label class="form-label">Shadow</label>
                  <input
                    class="form-range"
                    type="range"
                    id="shadow"
                    min="0"
                    max="1"
                    step="0.02" />
                </div>
              </div>

              <hr class="panel__hr" />

              <div class="panel__title">Background</div>
              <div
                class="d-flex flex-wrap gap-2"
                id="bgChips"
                aria-label="Background presets"></div>

              <hr class="panel__hr" />

              <div class="panel__title">Copy Code</div>
              <div class="d-flex flex-wrap gap-2 mb-2">
                <button
                  class="btn btn-light btn-sm"
                  id="copyAll">
                  Copy All
                </button>
                <button
                  class="btn btn-outline-light btn-sm"
                  id="copyHTML">
                  Copy HTML
                </button>
                <button
                  class="btn btn-outline-light btn-sm"
                  id="copyCSS">
                  Copy CSS
                </button>
                <button
                  class="btn btn-outline-light btn-sm"
                  id="reset">
                  Reset
                </button>
              </div>
              <textarea
                class="codebox"
                id="codeBox"
                rows="14"
                spellcheck="false"></textarea>
              <div
                class="small app-subtitle mt-2"
                id="copyStatus"
                aria-live="polite"></div>

              <hr class="panel__hr" />

              <div class="panel__title">Share & Save</div>
              <div class="d-flex flex-wrap gap-2 mb-2">
                <button
                  class="btn btn-outline-light btn-sm"
                  id="copyLink">
                  Copy Link
                </button>
                <button
                  class="btn btn-outline-light btn-sm"
                  id="exportSettings">
                  Export Settings
                </button>
                <button
                  class="btn btn-outline-light btn-sm"
                  id="importSettings">
                  Import Settings
                </button>
              </div>
              <textarea
                class="codebox codebox--settings"
                id="settingsBox"
                rows="6"
                spellcheck="false"
                placeholder='Paste settings JSON here, then click "Import Settings".'></textarea>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="js/script.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
  </body>
</html>
